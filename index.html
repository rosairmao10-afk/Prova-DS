<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="main-container">
        <div class="content-wrapper">
            <div id="conteudo-app" class="app-content">
                <div class="layout-grid">
                    <div class="slide-bar">

                        <!-- --- FORMULARIO --- -->
                        <div class="form-card">
                            <div class="form-header">
                                <h2 id="form-titulo" class="form-title">Nova Tarefa</h2>
                                <button onclick="criarTabelaTarefa()" id="btn-cancelar"
                                    class="btn-cancel hidden">Cancelar Edição</button>

                            </div>

                            <form id="form-tarefa" class="form-body">
                                <input type="hidden" id="tarefa-id" value="">
                                <input type="hidden" id="criado_em" value="">
                                <div class="form-group">
                                    <label class="form-label" for="titulo">Titulo <span
                                            class="required">*</span></label>
                                    <input type="text" id="titulo" class="form-control" required>
                                </div>

                                <!-- -- descrição --- -->
                                <div class="form-group">
                                    <label class="form-label" for="descricao">Descrição</label></label>

                                    <input type="text" id="descricao" class="form-control"
                                         required>

                                </div>

                                 <div class="form-group">
                                    <label class="form-label" for="urgencia">Urgencia<span
                                            class="required">*</span></label>
                                    <select class="form-control" id="urgencia">
                                        <option value="nao-urgente">Tarefa Não Urgente</option>
                                        <option value="normal">Tarefa Normal</option>
                                        <option value="urgente">Tarefa Urgente</option>
                                    </select>
                                </div>

                                <button type="submit" id="btn-salvar" class="btn-submit">
                                    <i class="fas fa-save"></i><span id="btn-salvar-text">Salvar Tarefa</span>
                                </button>

                            </form>
                        </div>
                    </div>

                    <div class="main-col">
                        <div class="table-card">
                            <div class="form-header">
                                <h2 class="form-title">Tarefas Cadastradas</h2>
                                <button onclick="criarTabelaTarefa" class="btn-refresh">
                                    <i class="fas fa-sync-alt"></i>Atualizar
                                </button>
                            </div>

                            <div class="tableresponsive">
                                <table class="data-table">
                                    <thead>
                                        <tr class="table-head-row">
                                            <th>ID</th>
                                            <th>Titulo / Descrição</th>
                                            <th>Criado em</th>
                                            <th>Urgencia</th>
                                            <th class="text-center">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabela-corpo">
                                        <tr>
                                            <td colspan="4" class="empty-state">
                                                <i class="fas fa-spinner fa-spin"></i>
                                                <br>
                                                Carregando Dados...
                                            </td>
                                        </tr>
                                    </tbody>

                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script type="module" src="script.js"></script>
    <script type="module" src="script_db.js"></script>
</body>

</html>
